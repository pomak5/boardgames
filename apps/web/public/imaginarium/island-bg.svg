<svg
      className="im-island-bg"
      viewBox="0 0 1920 1080"
      preserveAspectRatio="xMidYMid slice"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <defs>
        <radialGradient id="skyGradient" cx="50%" cy="30%" r="80%">
          <stop offset="0%" stopColor="#1a2332" />
          <stop offset="50%" stopColor="#0f141d" />
          <stop offset="100%" stopColor="#080a0f" />
        </radialGradient>
        <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#fff8e1" stopOpacity="0.9" />
          <stop offset="40%" stopColor="#f5d89a" stopOpacity="0.4" />
          <stop offset="100%" stopColor="#f5d89a" stopOpacity="0" />
        </radialGradient>
        <radialGradient id="waterGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#5a8a9a" stopOpacity="0.25" />
          <stop offset="100%" stopColor="#1a253a" stopOpacity="0" />
        </radialGradient>
        <linearGradient id="whaleBody" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stopColor="#4a5a82" />
          <stop offset="50%" stopColor="#3a4a6e" />
          <stop offset="100%" stopColor="#2a3a52" />
        </linearGradient>
        <linearGradient id="islandBody" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stopColor="#4a5a36" />
          <stop offset="60%" stopColor="#3d4a30" />
          <stop offset="100%" stopColor="#2d3a25" />
        </linearGradient>
        <linearGradient id="castleWall" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stopColor="#7a6a55" />
          <stop offset="100%" stopColor="#4a3a30" />
        </linearGradient>
        <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="8" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
        <filter id="lanternGlow" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="6" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>

      {/* Небо */}
      <rect width="1920" height="1080" fill="url(#skyGradient)" />

      {/* Звёзды */}
      <g fill="#f5d89a" opacity="0.8">
        {Array.from({ length: 120 }, (_, i) => {
          const x = ((i * 137.5) % 1920);
          const y = ((i * 89.7) % 700);
          const r = ((i * 0.7) % 1.8) + 0.5;
          const opacity = ((i * 0.3) % 0.7) + 0.3;
          return <circle key={i} cx={x} cy={y} r={r} opacity={opacity} />;
        })}
      </g>

      {/* Луна */}
      <g transform="translate(1600, 160)">
        <circle cx="0" cy="0" r="90" fill="url(#moonGlow)" />
        <circle cx="0" cy="0" r="38" fill="#fff8e1" />
        <circle cx="-8" cy="-6" r="6" fill="#f5d89a" opacity="0.5" />
        <circle cx="12" cy="8" r="4" fill="#f5d89a" opacity="0.4" />
      </g>

      {/* Облака */}
      <g fill="#1a2332" opacity="0.5" filter="url(#softGlow)">
        <ellipse cx="300" cy="250" rx="180" ry="45" />
        <ellipse cx="500" cy="300" rx="140" ry="35" />
        <ellipse cx="1400" cy="350" rx="200" ry="50" />
        <ellipse cx="1600" cy="280" rx="120" ry="30" />
        <ellipse cx="900" cy="180" rx="160" ry="40" />
      </g>

      {/* Далёкие острова */}
      <g opacity="0.4" fill="#2a3a52">
        <ellipse cx="250" cy="520" rx="90" ry="35" />
        <ellipse cx="1700" cy="500" rx="110" ry="40" />
        <ellipse cx="110" cy="480" rx="50" ry="20" />
      </g>

      {/* Вода под китом */}
      <ellipse cx="960" cy="680" rx="520" ry="180" fill="url(#waterGlow)" />
      <ellipse cx="960" cy="700" rx="420" ry="140" fill="#1a253a" opacity="0.6" />

      {/* Тело кита */}
      <g transform="translate(960, 600)">
        <path
          d="M-260,40 Q-280,-80 -120,-120 Q0,-150 140,-110 Q260,-60 280,40 Q260,90 140,100 Q0,110 -120,100 Q-260,90 -260,40 Z"
          fill="url(#whaleBody)"
        />
        <path
          d="M-120,-120 Q-60,-160 60,-140 Q140,-120 160,-80"
          fill="none"
          stroke="#5a6a92"
          strokeWidth="6"
          strokeLinecap="round"
          opacity="0.5"
        />
        {/* Пятнышки на ките */}
        <circle cx="-80" cy="-40" r="12" fill="#5a6a92" opacity="0.4" />
        <circle cx="40" cy="-60" r="8" fill="#5a6a92" opacity="0.4" />
        <circle cx="160" cy="-20" r="14" fill="#5a6a92" opacity="0.4" />
        <circle cx="-180" cy="10" r="10" fill="#5a6a92" opacity="0.4" />

        {/* Глаз */}
        <circle cx="220" cy="-30" r="12" fill="#f5d89a" filter="url(#lanternGlow)" />
        <circle cx="222" cy="-32" r="4" fill="#fff" />

        {/* Спинной плавник */}
        <path d="M-40,-120 Q-20,-180 0,-170 Q20,-180 40,-120 Z" fill="#2a3a52" />
        {/* Боковые плавники */}
        <path d="M-180,-20 Q-240,-40 -230,20 Q-200,10 -180,-20 Z" fill="#2a3a52" />
        <path d="M180,-20 Q240,-40 230,20 Q200,10 180,-20 Z" fill="#2a3a52" />
        {/* Хвост */}
        <path d="M-260,20 Q-330,-10 -340,-60 Q-350,-10 -320,40 Q-280,60 -260,40 Z" fill="#2a3a52" />

        {/* Фонтан из спинки */}
        <g fill="#8ab4d8" opacity="0.6" filter="url(#softGlow)">
          <circle cx="0" cy="-170" r="10" />
          <circle cx="-15" cy="-200" r="7" />
          <circle cx="18" cy="-210" r="6" />
          <circle cx="5" cy="-235" r="4" />
        </g>

        {/* Остров на спине */}
        <g transform="translate(0, -140)">
          <ellipse cx="0" cy="30" rx="180" ry="70" fill="url(#islandBody)" />
          <ellipse cx="-60" cy="5" rx="90" ry="45" fill="#4a5a36" />
          <ellipse cx="80" cy="15" rx="70" ry="40" fill="#4a5a36" />

          {/* Замки */}
          <g transform="translate(-80, -50)">
            <rect x="-15" y="0" width="30" height="55" fill="url(#castleWall)" />
            <path d="M-22,0 L0,-25 L22,0 Z" fill="#3a2a22" />
            <rect x="-35" y="20" width="20" height="35" fill="url(#castleWall)" />
            <path d="M-40,20 L-25,5 L-10,20 Z" fill="#3a2a22" />
            <rect x="15" y="20" width="20" height="35" fill="url(#castleWall)" />
            <path d="M10,20 L25,5 L40,20 Z" fill="#3a2a22" />
          </g>
          <g transform="translate(70, -45) scale(0.85)">
            <rect x="-12" y="0" width="24" height="48" fill="url(#castleWall)" />
            <path d="M-18,0 L0,-22 L18,0 Z" fill="#3a2a22" />
          </g>
          <g transform="translate(10, -65) scale(0.7)">
            <rect x="-12" y="0" width="24" height="48" fill="url(#castleWall)" />
            <path d="M-18,0 L0,-22 L18,0 Z" fill="#3a2a22" />
          </g>

          {/* Деревья */}
          <g fill="#3d4a25">
            <ellipse cx="-130" cy="25" rx="22" ry="30" />
            <rect x="-134" y="25" width="8" height="25" fill="#2d3a1a" />
            <ellipse cx="140" cy="30" rx="25" ry="32" />
            <rect x="136" y="30" width="8" height="22" fill="#2d3a1a" />
            <ellipse cx="-40" cy="35" rx="18" ry="24" />
            <rect x="-43" y="35" width="6" height="18" fill="#2d3a1a" />
            <ellipse cx="40" cy="40" rx="20" ry="26" />
            <rect x="37" y="40" width="6" height="16" fill="#2d3a1a" />
          </g>

          {/* Фонарики */}
          <circle cx="-80" cy="-55" r="6" fill="#f5d89a" filter="url(#lanternGlow)" />
          <circle cx="70" cy="-50" r="5" fill="#f5d89a" filter="url(#lanternGlow)" />
          <circle cx="10" cy="-70" r="4" fill="#f5d89a" filter="url(#lanternGlow)" />
        </g>
      </g>

      {/* Мелкие облака внизу */}
      <g fill="#0f141d" opacity="0.6" filter="url(#softGlow)">
        <ellipse cx="200" cy="850" rx="250" ry="60" />
        <ellipse cx="1700" cy="820" rx="280" ry="70" />
        <ellipse cx="960" cy="920" rx="300" ry="50" />
      </g>
    </svg>